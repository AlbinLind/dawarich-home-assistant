name: Release Branch Automatically

on:
  create:
    branches:
      - 'release/*'

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}

    - name: Version extraction
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/heads/release/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT

        if [[ "$VERSION" == *"-"* ]]; then
          echo "prerelease=true" >> $GITHUB_OUTPUT
        else
          echo "prerelease=false" >> $GITHUB_OUTPUT
        fi

    - name: Update manifest.json version
      run: |
        VERSION=${{ steps.version.outputs.version }}
        jq --arg -v "$VERSION" '.version=$v' ./custom_components/dawarich/manifest.json > manifest.tmp
        mv manifest.tmp ./custom_components/dawarich/manifest.json

    - name: Commit version update
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add ./custom_components/dawarich/manifest.json
        git commit -m "[auto] set version ${{ steps.version.outputs.version }}"
        git push

    - name: Draft release
      uses: softproprs/action-gh-release@v2
      with:
        tag_name: "${{ steps.version.outputs.version }}"
        draft: true
        target_commitish: "${{ github.ref }}"
        generate_release_notes: true
        prerelease: "${{ steps.version.outputs.prerelease }}"


